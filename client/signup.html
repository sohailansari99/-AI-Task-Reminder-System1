<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup | AI Task Reminder</title>
  <link rel="stylesheet" href="./css/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <div class="auth-brand">AI Reminder</div>
      <h1>Create your account</h1>
      <p>Start building reminders, task plans, and AI-powered schedules in one place.</p>
    </div>

    <div class="auth-right">
      <form class="auth-form" id="signupForm">
        <h2>Signup</h2>
        <p class="subtext">Create your smart productivity account</p>

        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name" required />

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email" required />

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />

        <button type="submit">Create Account</button>

        <p class="bottom-text">
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </form>
    </div>
  </div>

  <script src="./js/auth.js"></script>
</body>
</html>
